<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Columbus-Ω | Register</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="scanline"></div>

<div class="login-page">
  <div>
    <div class="login-box">
      <div class="login-logo">
        <span class="big-symbol">COL-Ω</span>
        <span class="sub">CREATE OPERATOR ACCOUNT</span>
      </div>
      <p class="login-title">⬡ NEW OPERATOR REGISTRATION</p>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          {% for msg in messages %}
            <div class="alert {% if 'success' in msg.lower() or 'created' in msg.lower() %}alert-success{% else %}alert-danger{% endif %}">
              {{ msg }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
          <label class="form-label">Choose Operator ID</label>
          <input type="text" name="username" class="form-control" placeholder="Enter unique operator ID"
                 required autocomplete="off" minlength="3" maxlength="30">
        </div>
        <div class="form-group">
          <label class="form-label">Access Key (Password)</label>
          <input type="password" name="password" class="form-control" placeholder="Min 6 characters"
                 required minlength="6">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Access Key</label>
          <input type="password" name="password2" class="form-control" placeholder="Repeat password"
                 required minlength="6">
        </div>
        <div class="form-group">
          <label class="form-label">Starting Balance (COL)</label>
          <input type="text" class="form-control" value="1,000.00 COL" disabled
                 style="color:var(--green);opacity:0.7;">
        </div>
        <button type="submit" class="btn btn-green" style="width:100%;justify-content:center;margin-top:8px;">
          ✦ CREATE OPERATOR ACCOUNT
        </button>
      </form>

      <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);text-align:center;">
        <a href="{{ url_for('login') }}" style="font-family:var(--font-mono);font-size:11px;color:var(--cyan);text-decoration:none;letter-spacing:2px;">
          ← BACK TO LOGIN
        </a>
      </div>
    </div>

    <p style="font-family:var(--font-mono);font-size:9px;color:var(--text-dim);text-align:center;margin-top:16px;letter-spacing:2px;">
      ALL REGISTRATIONS ARE LOGGED · COLUMBUS-Ω GUARDIAN SYSTEM
    </p>
  </div>
</div>
</body>
</html>
